load_module /usr/lib/nginx/modules/ngx_otel_module.so;
worker_processes auto;
events {
    worker_connections 1024;
}



http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # OTEL contrib plugin: directive-based config (compatible with opentelemetry-cpp-contrib nginx/v0.1.1)
    otel_exporter {
        endpoint "otel-collector:4317";
        interval 100;
        batch_size 1;
    }
    otel_service_name "nginx-otel";
    otel_trace on;

    server {
        listen 8080;
        server_name localhost;

        location / {
            default_type text/plain;
            return 200 "nginx-otel is running\n";
        }

        location /stub_status {
            stub_status;
            allow all;
        }
    }
}