---

# This GitHub Actions workflow is designed to be triggered when a release is marked as a full release.
# The workflow performs the following tasks:.
# 1. Builds and publishes a Docker image.
# 2. Creates a GitHub release.

name: Release And Publish Docker Artifact

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        default: '1.0.0'
        type: string
        description: 'Release version (e.g., 1.0.0)'
      dry-run:
        required: false
        type: boolean
        default: false
        description: 'Dry run'
      skip-nginx:
        required: false
        type: boolean
        default: false
        description: 'Skip nginx image build and publish'
permissions:
  contents: write
  packages: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Create tag
        if: ${{ !inputs.dry-run }}
        uses: netcracker/qubership-workflow-hub/actions/tag-action@v2.2.1
        with:
          ref: main
          tag-name: v${{ github.event.inputs.version }}
          tag-message: Tag v${{ github.event.inputs.version }}
          dry-run: ${{ inputs.dry-run }}

  core-base-docker-build:
    needs: [ create-tag ]
    name: Core image
    uses: Netcracker/qubership-core-infra/.github/workflows/docker-build.yaml@05f471f3d4da2107a6ed3286f839ec517c2c18b8
    with:
      build-args: |
        BASE_IMAGE_TAG=ghcr.io/netcracker/qubership-core-base:${{ inputs.version }}
      tags: "${{ inputs.version }}"
      config-filename: "core-base-docker-release-config.json"
      dry-run: ${{ inputs.dry-run }}

  java-prof-21-docker-build:
    needs: [ core-base-docker-build ]
    name: Java 21 image
    uses: Netcracker/qubership-core-infra/.github/workflows/docker-build.yaml@05f471f3d4da2107a6ed3286f839ec517c2c18b8
    with:
      build-args: |
        BASE_IMAGE=ghcr.io/netcracker/qubership-core-base:${{ inputs.version }}
        BASE_IMAGE_TAG=ghcr.io/netcracker/qubership-java-base-prof:21-alpine-${{ inputs.version }}
      tags: "21-alpine-${{ inputs.version }},21-alpine-latest"
      config-filename: "java-prof-21-docker-release-config.json"
      dry-run: ${{ inputs.dry-run }}

  java-25-docker-build:
    needs: [ core-base-docker-build ]
    name: Java 25 image
    uses: Netcracker/qubership-core-infra/.github/workflows/docker-build.yaml@05f471f3d4da2107a6ed3286f839ec517c2c18b8
    with:
      build-args: |
        BASE_IMAGE=ghcr.io/netcracker/qubership-core-base:${{ inputs.version }}
        BASE_IMAGE_TAG=ghcr.io/netcracker/qubership-java-base:25-alpine-${{ inputs.version }}
      tags: "25-alpine-${{ inputs.version }},25-alpine-latest"
      config-filename: "java-25-docker-release-config.json"
      dry-run: ${{ inputs.dry-run }}

  java-prof-25-docker-build:
    needs: [ java-25-docker-build ]
    name: Java Prof 25 image
    uses: Netcracker/qubership-core-infra/.github/workflows/docker-build.yaml@05f471f3d4da2107a6ed3286f839ec517c2c18b8
    with:
      build-args: |
        BASE_IMAGE=ghcr.io/netcracker/qubership-java-base:25-alpine-${{ inputs.version }}
        BASE_IMAGE_TAG=ghcr.io/netcracker/qubership-java-base-prof:25-alpine-${{ inputs.version }}
      tags: "25-alpine-${{ inputs.version }},25-alpine-latest"
      config-filename: "java-prof-25-docker-release-config.json"
      dry-run: ${{ inputs.dry-run }}

  nginx-docker-build:
    needs: [ core-base-docker-build ]
    if: ${{ !inputs.skip-nginx }}
    name: Nginx image
    uses: Netcracker/qubership-core-infra/.github/workflows/docker-build.yaml@05f471f3d4da2107a6ed3286f839ec517c2c18b8
    with:
      build-args: |
        BASE_IMAGE=ghcr.io/netcracker/qubership-core-base:${{ inputs.version }}
        BASE_IMAGE_TAG=ghcr.io/netcracker/qubership-nginx-base:${{ inputs.version }}
      tags: "${{ inputs.version }},latest"
      config-filename: "nginx-base-docker-release-config.json"
      dry-run: ${{ inputs.dry-run }}

  github-release:
    needs: [create-tag]
    if: ${{ !inputs.dry-run }}
    uses: netcracker/qubership-workflow-hub/.github/workflows/release-drafter.yml@v2.2.1
    with:
      version: ${{ github.event.inputs.version }}
      publish: false