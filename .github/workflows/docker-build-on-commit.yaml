---
# yamllint disable rule:line-length
name: Build and Push On Commit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types:
      [opened, reopened, synchronize]

env:
  PLATFORMS: linux/amd64,linux/arm64

permissions:
  contents: read
  packages: write

jobs:
  prepare-variables:
    runs-on: ubuntu-latest
    steps:
      - id: tag_build_number
        run: echo "tag=$(echo '${{github.ref_name}}' | tr -cs 'a-zA-Z0-9' '-')$(date +'%Y%m%d%H%M%S')-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
      - id: tag_snapshot
        run: echo "tag=$(echo '${{github.ref_name}}' | tr -cs 'a-zA-Z0-9' '-')snapshot" >> "$GITHUB_OUTPUT"
    outputs:
      tag_build_number: ${{ steps.tag_build_number.outputs.tag }}
      tag_snapshot: ${{ steps.tag_snapshot.outputs.tag }}
  build-and-push:
    runs-on: ubuntu-latest
    needs: prepare-variables
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          driver: docker
      
      - name: Build and load test core-image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          build-args: |
            BASE_IMAGE_TAG=ghcr.io/netcracker/qubership-core-base:test
          tags: |
            ghcr.io/netcracker/qubership-core-base:test
          file: images/core/Dockerfile

      - name: Build and load test java 21 image with prof
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          build-args: |
            BASE_IMAGE=ghcr.io/netcracker/qubership-core-base:test
            BASE_IMAGE_TAG=ghcr.io/netcracker/qubership-java-base-prof:21-test
          tags: |
            ghcr.io/netcracker/qubership-java-base:21-test
            ghcr.io/netcracker/qubership-java-base-prof:21-test
          file: images/java-21-prof/Dockerfile

      - name: Build and load test java 25 image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          build-args: |
            BASE_IMAGE=ghcr.io/netcracker/qubership-core-base:test
            BASE_IMAGE_TAG=ghcr.io/netcracker/qubership-java-base:25-test
          tags: ghcr.io/netcracker/qubership-java-base:25-test
          file: images/java-25/Dockerfile

      - name: Build and load test java 25 image with prof
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          build-args: |
            BASE_IMAGE=ghcr.io/netcracker/qubership-java-base:25-test
            BASE_IMAGE_TAG=ghcr.io/netcracker/qubership-java-base-prof:25-test
          tags: ghcr.io/netcracker/qubership-java-base-prof:25-test
          file: images/java-25-prof/Dockerfile

      - name: Build and load test nginx base image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          build-args: |
            BASE_IMAGE=ghcr.io/netcracker/qubership-core-base:test
            BASE_IMAGE_TAG=ghcr.io/netcracker/qubership-nginx-base:test
          tags: |
            ghcr.io/netcracker/qubership-nginx-base:test
          file: images/nginx/Dockerfile

      - name: Run tests on containers
        run: |
          ./tests/test-suite.sh ghcr.io/netcracker/qubership-core-base:test
          ./tests/test-suite.sh ghcr.io/netcracker/qubership-java-base-prof:21-test
          ./tests/test-suite.sh ghcr.io/netcracker/qubership-java-base:25-test
          ./tests/test-suite.sh ghcr.io/netcracker/qubership-java-base-prof:25-test
          ./tests/test-suite.sh ghcr.io/netcracker/qubership-nginx-base:test

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: zulu
          java-version: 21
          server-id: central

      - name: Cache local Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Test profiler integration
        working-directory: test-profiler
        # language=bash
        run: |
          ./mvnw --batch-mode verify -Dqubership.profiler.java-base-image.tag=ghcr.io/netcracker/qubership-java-base:21-test
          ./mvnw --batch-mode verify -Dqubership.profiler.java-base-image.tag=ghcr.io/netcracker/qubership-java-base-prof:25-test

      - name: Add snapshot tags and push images
        if: ${{ !startsWith(github.ref, 'refs/heads/dependabot/') }}
        env:
          TAG_SNAPSHOT: ${{ needs.prepare-variables.outputs.tag_snapshot }}
          TAG_BUILD_NUMBER: ${{ needs.prepare-variables.outputs.tag_build_number }}
        run: |
          # core-base
          docker tag ghcr.io/netcracker/qubership-core-base:test ghcr.io/netcracker/qubership-core-base:$TAG_SNAPSHOT
          docker tag ghcr.io/netcracker/qubership-core-base:test ghcr.io/netcracker/qubership-core-base:$TAG_BUILD_NUMBER
          docker push ghcr.io/netcracker/qubership-core-base:$TAG_SNAPSHOT
          docker push ghcr.io/netcracker/qubership-core-base:$TAG_BUILD_NUMBER
          # java 21 (base and prof)
          docker tag ghcr.io/netcracker/qubership-java-base:21-test ghcr.io/netcracker/qubership-java-base:21-alpine-$TAG_SNAPSHOT
          docker tag ghcr.io/netcracker/qubership-java-base:21-test ghcr.io/netcracker/qubership-java-base:21-alpine-$TAG_BUILD_NUMBER
          docker tag ghcr.io/netcracker/qubership-java-base-prof:21-test ghcr.io/netcracker/qubership-java-base-prof:21-alpine-$TAG_SNAPSHOT
          docker tag ghcr.io/netcracker/qubership-java-base-prof:21-test ghcr.io/netcracker/qubership-java-base-prof:21-alpine-$TAG_BUILD_NUMBER
          docker push ghcr.io/netcracker/qubership-java-base:21-alpine-$TAG_SNAPSHOT
          docker push ghcr.io/netcracker/qubership-java-base:21-alpine-$TAG_BUILD_NUMBER
          docker push ghcr.io/netcracker/qubership-java-base-prof:21-alpine-$TAG_SNAPSHOT
          docker push ghcr.io/netcracker/qubership-java-base-prof:21-alpine-$TAG_BUILD_NUMBER
          # java 25 (base and prof)
          docker tag ghcr.io/netcracker/qubership-java-base:25-test ghcr.io/netcracker/qubership-java-base:25-alpine-$TAG_SNAPSHOT
          docker tag ghcr.io/netcracker/qubership-java-base:25-test ghcr.io/netcracker/qubership-java-base:25-alpine-$TAG_BUILD_NUMBER
          docker tag ghcr.io/netcracker/qubership-java-base-prof:25-test ghcr.io/netcracker/qubership-java-base-prof:25-alpine-$TAG_SNAPSHOT
          docker tag ghcr.io/netcracker/qubership-java-base-prof:25-test ghcr.io/netcracker/qubership-java-base-prof:25-alpine-$TAG_BUILD_NUMBER
          docker push ghcr.io/netcracker/qubership-java-base:25-alpine-$TAG_SNAPSHOT
          docker push ghcr.io/netcracker/qubership-java-base:25-alpine-$TAG_BUILD_NUMBER
          docker push ghcr.io/netcracker/qubership-java-base-prof:25-alpine-$TAG_SNAPSHOT
          docker push ghcr.io/netcracker/qubership-java-base-prof:25-alpine-$TAG_BUILD_NUMBER
          # nginx-base
          docker tag ghcr.io/netcracker/qubership-nginx-base:test ghcr.io/netcracker/qubership-nginx-base:$TAG_SNAPSHOT
          docker tag ghcr.io/netcracker/qubership-nginx-base:test ghcr.io/netcracker/qubership-nginx-base:$TAG_BUILD_NUMBER
          docker push ghcr.io/netcracker/qubership-nginx-base:$TAG_SNAPSHOT
          docker push ghcr.io/netcracker/qubership-nginx-base:$TAG_BUILD_NUMBER